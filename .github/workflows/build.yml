name: Build fastlckin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

# Required for softprops/action-gh-release to upload release assets
permissions:
  contents: write

jobs:
  # -----------------------------------------------------------
  # Job 1: Build + Test (dynamic linking, for CI verification)
  # -----------------------------------------------------------
  build:
    name: Build & Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: fastlckin-linux
          - os: macos-latest
            artifact_name: fastlckin-macos

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake autoconf automake \
          zlib1g-dev libbz2-dev liblzma-dev

    - name: Install Dependencies (macOS)
      if: runner.os == 'macOS'
      run: brew install autoconf automake zlib bzip2 xz

    - name: Configure CMake
      run: |
        cmake -B ${{ github.workspace }}/build \
              -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build ${{ github.workspace }}/build --config Release --parallel

    - name: Generate test data
      run: ${{ github.workspace }}/build/tests/generate_test_data

    - name: Test
      working-directory: ${{ github.workspace }}/build
      run: ctest -C Release --output-on-failure

    - name: Prepare artifacts
      run: |
        mkdir -p dist
        cp bin/fastlckin dist/${{ matrix.artifact_name }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/${{ matrix.artifact_name }}

    - name: Upload Release Assets
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        files: dist/${{ matrix.artifact_name }}

  # -----------------------------------------------------------
  # Job 2: Static build (for release distribution)
  #
  # Linux : Build natively on ubuntu-22.04 (glibc 2.35) with
  #         -static-libstdc++ -static-libgcc and statically-linked
  #         htslib + compression libs. glibc remains dynamic.
  #         Result is portable to any glibc >= 2.35 distribution.
  # macOS : Best-effort static; only system frameworks remain dynamic.
  # -----------------------------------------------------------
  build-static:
    name: Static Build (${{ matrix.config.os_name }})
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - os: ubuntu-22.04
            os_name: linux-x86_64
            artifact_name: fastlckin-linux-static
          - os: macos-latest
            os_name: macos-arm64
            artifact_name: fastlckin-macos-static

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    # ========== Linux: Ubuntu glibc partial-static build ==========
    - name: Install Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake autoconf automake \
          zlib1g-dev libbz2-dev liblzma-dev

    - name: Build static binary (Linux / Ubuntu-glibc)
      if: runner.os == 'Linux'
      run: |
        echo "=== Cleaning stale htslib artifacts ==="
        (cd htslib && make distclean) 2>/dev/null || true
        find htslib -type f -name "*.o"   -delete 2>/dev/null || true
        find htslib -type f -name "libhts.*" -not -name "libhts.map" -delete 2>/dev/null || true

        echo "=== Configuring (STATIC_BUILD=ON) ==="
        cmake -B build-static \
          -DSTATIC_BUILD=ON \
          -DCMAKE_BUILD_TYPE=Release

        echo "=== Building ==="
        cmake --build build-static --config Release --parallel

        echo "=== Verifying binary ==="
        file bin/fastlckin
        readelf -d bin/fastlckin | grep NEEDED || true
        ldd bin/fastlckin || true
        ./bin/fastlckin --help 2>&1 | head -20 || true

    # ========== macOS: best-effort static build ===================
    - name: Install Dependencies (macOS)
      if: runner.os == 'macOS'
      run: brew install autoconf automake zlib bzip2 xz

    - name: Build static binary (macOS)
      if: runner.os == 'macOS'
      run: |
        (cd htslib && make distclean) 2>/dev/null || true
        find htslib -type f -name "*.o" -delete 2>/dev/null || true
        find htslib -type f -name "libhts.*" -not -name "libhts.map" -delete 2>/dev/null || true
        cmake -B build-static \
          -DSTATIC_BUILD=ON \
          -DCMAKE_BUILD_TYPE=Release
        cmake --build build-static --config Release --parallel

    - name: Verify binary (macOS)
      if: runner.os == 'macOS'
      run: |
        file bin/fastlckin
        otool -L bin/fastlckin
        ./bin/fastlckin --help 2>&1 | head -20 || true

    # ========== Common: artifact & release ========================
    - name: Prepare artifacts
      run: |
        mkdir -p dist
        cp bin/fastlckin dist/${{ matrix.config.artifact_name }}
        chmod +x dist/${{ matrix.config.artifact_name }}

    - name: Upload artifacts (CI)
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.config.artifact_name }}
        path: dist/${{ matrix.config.artifact_name }}

    - name: Upload Release Assets
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        files: dist/${{ matrix.config.artifact_name }}
